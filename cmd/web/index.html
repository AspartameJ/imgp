<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>imgp - Docker 镜像下载工具</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header>
    <h1>imgp <span class="subtitle">Docker 镜像下载工具</span></h1>
    <div>
      <button class="btn btn-config" onclick="showConfig()">⚙ 配置</button>
      <button class="btn btn-config" onclick="stopServer()" style="color:#e74c3c">⏹ 停止</button>
    </div>
  </header>

  <div class="card">
    <h2>下载镜像</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="imageName">镜像名</label>
        <input type="text" id="imageName" placeholder="hello-world:latest" value="hello-world:latest">
      </div>
      <div class="form-group">
        <label for="platform">目标平台</label>
        <select id="platform">
          <option value="linux/amd64">linux/amd64</option>
          <option value="linux/arm64">linux/arm64</option>
          <option value="linux/arm64/v8">linux/arm64/v8</option>
          <option value="windows/amd64">windows/amd64</option>
          <option value="windows/arm64">windows/arm64</option>
          <option value="darwin/amd64">darwin/amd64</option>
          <option value="darwin/arm64">darwin/arm64</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="outputFile">输出文件</label>
        <input type="text" id="outputFile" placeholder="自动生成">
      </div>
      <div class="form-group">
        <label for="username">用户名（可选）</label>
        <input type="text" id="username" placeholder="registry 用户名">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="password">密码（可选）</label>
        <input type="password" id="password" placeholder="registry 密码">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
          <input type="checkbox" id="insecure" style="width:auto">
          允许非 TLS 连接
        </label>
        <button class="btn btn-primary" onclick="startDownload()" style="margin-left:auto">▶ 开始下载</button>
      </div>
    </div>
  </div>

  <div id="progressSection" class="card" style="display:none">
    <h2>下载进度</h2>
    <div id="progressHeader"></div>
    <div id="layerList"></div>
    <div id="exportProgress" style="display:none"></div>
    <div id="errorBox" style="display:none"></div>
    <div id="doneBox" style="display:none"></div>
  </div>

  <div class="card">
    <h2>缓存</h2>
    <div id="cacheInfo">加载中...</div>
    <button class="btn btn-danger" onclick="clearCache()" style="margin-top:8px">🗑 清空缓存</button>
  </div>
</div>

<div id="configModal" class="modal" style="display:none">
  <div class="modal-content">
    <span class="close" onclick="hideConfig()">&times;</span>
    <h2>配置</h2>
    <h3>镜像加速映射</h3>
    <table id="mirrorTable">
      <thead><tr><th>Registry</th><th>镜像地址</th><th></th></tr></thead>
      <tbody id="mirrorTableBody"></tbody>
    </table>
    <button class="btn" onclick="addMirrorRow()">+ 新增</button>
    <h3>其他设置</h3>
    <div class="form-row">
      <div class="form-group">
        <label for="cfgParallelism">并行下载数</label>
        <input type="number" id="cfgParallelism" min="1" max="16">
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveConfig()" style="margin-top:12px">💾 保存配置</button>
    <span id="configStatus" style="margin-left:12px;color:green"></span>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
